<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 menu">

            <h3>Dashboard</h3>

            <a href="#">Home</a>
            <a href="#">Students</a>
            <a href="#">Courses</a>
            <a href="#">Exams</a>
            <a href="#">Settings</a>

        </div>

        <!-- Main Content -->
        <div class="col-md-10 content">

            <h2>College Admin Dashboard</h2>

            <div class="row mt-4">

                <div class="col-md-3">
                    <div class="box bg-primary text-white">
                        <h4>500</h4>
                        <p>Students</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="box bg-success text-white">
                        <h4>20</h4>
                        <p>Courses</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="box bg-warning text-white">
                        <h4>15</h4>
                        <p>Teachers</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="box bg-danger text-white">
                        <h4>50</h4>
                        <p>Exams</p>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
